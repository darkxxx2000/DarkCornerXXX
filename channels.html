<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DARK CORNER - Channels</title>

<style>
body{
    margin:0;
    background:#000;
    color:#fff;
    font-family:Arial;
}

header{
    padding:20px;
    border-bottom:1px solid #222;
}

.logo{
    font-size:26px;
    font-weight:bold;
}

.back{
    color:#aaa;
    text-decoration:none;
    display:block;
    margin-top:8px;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:20px;
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(250px, 1fr));
    gap:20px;
}

.card{
    background:#111;
    border-radius:10px;
    overflow:hidden;
    text-decoration:none;
    color:#fff;
    transition:.2s;
}

.card:hover{
    transform:scale(1.03);
}

.card img{
    width:100%;
    height:160px;
    object-fit:cover;
    display:block;
}

.card h3{
    margin:10px;
    font-size:16px;
}
</style>

</head>

<body>

<header>
    <div class="logo">DARK CORNER</div>
    <a class="back" href="index.html">← Back Home</a>
</header>

<div id="container" class="container"></div>

<script src="channels.js"></script>

</body>
</html>
