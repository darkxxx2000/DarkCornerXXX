<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DARK CORNER - Channels</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    color:#fff;
    font-family:Arial, Helvetica, sans-serif;
}

header{
    padding:20px;
    border-bottom:1px solid #222;
}

.logo{
    font-size:28px;
    font-weight:bold;
    letter-spacing:2px;
}

.back-link{
    display:inline-block;
    margin-top:10px;
    color:#aaa;
    text-decoration:none;
}

.back-link:hover{
    color:#fff;
}

.channels-container{
    max-width:1400px;
    margin:0 auto;
    padding:30px;
}

.channel{
    padding:30px;
}

.channel:nth-child(odd){
    background:#111;
}

.channel:nth-child(even){
    background:#181818;
}

.channel-title{
    margin-bottom:20px;
    font-size:28px;
}

.channel-row{
    display:flex;
    gap:20px;
    align-items:flex-start;
}

.channel-main{
    width:500px;
    max-width:100%;
    border-radius:8px;
    overflow:hidden;
}

.channel-main img{
    width:100%;
    display:block;
}

.gallery-grid{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
}

.gallery-grid img{
    width:180px;
    height:120px;
    object-fit:cover;
    border-radius:6px;
    cursor:pointer;
    transition:.2s;
}

.gallery-grid img:hover{
    opacity:.8;
}

/* Lightbox */

.lightbox{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.95);
    z-index:9999;
    justify-content:center;
    align-items:center;
}

.lightbox.active{
    display:flex;
}

.lightbox img{
    max-width:90vw;
    max-height:90vh;
}

.close{
    position:absolute;
    top:20px;
    right:30px;
    font-size:40px;
    cursor:pointer;
}
</style>
</head>

<body>

<header>
    <div class="logo">DARK CORNER</div>
    <a href="index.html" class="back-link">← Back to Home</a>
</header>

<div class="channels-container">

    <!-- CHANNEL 1 -->
    <section class="channel">

        <h2 class="channel-title">Channel One</h2>

        <div class="channel-row">

            <a class="channel-main"
               href="https://example.com"
               target="_blank"
               rel="noopener noreferrer">

                <img src="images/channel1-main.jpg" alt="Channel One">

            </a>

            <div class="gallery-grid">

                <img src="images/channel1-1.jpg" alt="">
                <img src="images/channel1-2.jpg" alt="">
                <img src="images/channel1-3.jpg" alt="">
                <img src="images/channel1-4.jpg" alt="">

            </div>

        </div>

    </section>

    <!-- CHANNEL 2 -->
    <section class="channel">

        <h2 class="channel-title">Channel Two</h2>

        <div class="channel-row">

            <a class="channel-main"
               href="https://example.com"
               target="_blank"
               rel="noopener noreferrer">

                <img src="images/channel2-main.jpg" alt="Channel Two">

            </a>

            <div class="gallery-grid">

                <img src="images/channel2-1.jpg" alt="">
                <img src="images/channel2-2.jpg" alt="">
                <img src="images/channel2-3.jpg" alt="">
                <img src="images/channel2-4.jpg" alt="">

            </div>

        </div>

    </section>

</div>

<!-- LIGHTBOX -->

<div id="lightbox" class="lightbox">
    <span class="close">&times;</span>
    <img id="lightboxImage" src="" alt="">
</div>

<script>
const lightbox = document.getElementById('lightbox');
const lightboxImage = document.getElementById('lightboxImage');

document.querySelectorAll('.gallery-grid img').forEach(img => {

    img.addEventListener('click', () => {

        lightboxImage.src = img.src;
        lightbox.classList.add('active');

    });

});

lightbox.addEventListener('click', () => {

    lightbox.classList.remove('active');

});
</script>

</body>
</html>
