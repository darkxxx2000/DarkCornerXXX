<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dark Corner</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>

<body>

<header class="topbar">
  <div class="logo">DARK CORNER</div>

  <nav>
    <a href="#home">HOME</a>
    <a href="#machine">MACHINE</a>
    <a href="#shibari">SHIBARI</a>
    <a href="#sybian">SYBIAN</a>
    <a href="#huge">HUGE</a>
    <a href="#bbc">BBC</a>
  </nav>
</header>

<section id="home" class="section">
  <h2>HOME</h2>
  <div class="grid" id="homeGrid"></div>
</section>

<section id="machine" class="section">
  <h2>MACHINE</h2>
  <div class="grid" data-cat="machine"></div>
</section>

<section id="shibari" class="section">
  <h2>SHIBARI</h2>
  <div class="grid" data-cat="shibari"></div>
</section>

<section id="sybian" class="section">
  <h2>SYBIAN</h2>
  <div class="grid" data-cat="sybian"></div>
</section>

<section id="huge" class="section">
  <h2>HUGE</h2>
  <div class="grid" data-cat="huge"></div>
</section>

<section id="bbc" class="section">
  <h2>BBC</h2>
  <div class="grid" data-cat="bbc"></div>
</section>

<!-- MODAL EMBED -->
<div id="modal" class="modal hidden">
  <div class="modal-content">
    <span id="close">&times;</span>
    <iframe id="videoFrame" allowfullscreen></iframe>
  </div>
</div>

<script src="js/app.js"></script>

</body>
</html>
